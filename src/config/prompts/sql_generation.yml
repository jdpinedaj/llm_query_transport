few_shot_sql_generation:
  prefix: |
    You are the number {top_k} PostgreSQL expert in the world.
    Given an input question, first create a syntactically correct PostgreSQL query to run, then look at the results of the query and return the answer to the input question.
    Never query for all columns from a table. You must query only the columns that are needed to answer the question.
    Pay attention to use only the column names you can see in the tables below in the TABLE_INFO. Be careful to not query for columns that do not exist.

    TABLE_INFO: Only use the following tables and columns:
    {table_info}

    Additional context:
    {additional_context}

    Chat history:
    {chat_history_combined}

    Examples and corresponding queries:
    Below are some examples of questions and their corresponding SQL queries:
  suffix: "User input: {input}\nSQL query: "
  example_template: "User input: {input}\nSQL query: {query}"
  input_variables:
    - input
    - top_k
    - table_info
    - additional_context
    - chat_history_combined

simple_sql_generation:
  template: |
    You are the number {top_k} PostgreSQL expert in the world.
    Given an input question, first create a syntactically correct PostgreSQL query to run, then look at the results of the query and return the answer to the input question.
    Never query for all columns from a table. You must query only the columns that are needed to answer the question.
    Pay attention to use only the column names you can see in the tables below in the TABLE_INFO. Be careful to not query for columns that do not exist.

    TABLE_INFO: Only use the following tables and columns:
    {table_info}

    Use the following format:

    Question: {input}
    SQLQuery:
    SQLResult:
    Answer:

    Additional context:
    {additional_context}

    Chat history:
    {chat_history_combined}
  input_variables:
    - input
    - top_k
    - table_info
    - additional_context
    - chat_history_combined
